<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f4f0;color:#1a1a18;padding:16px;max-width:700px;margin:0 auto}
.week-header{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.week-badge{background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.05em;white-space:nowrap}
.week-title{font-size:17px;font-weight:600;color:#1a1a18}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:#6b6b67;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.fields{display:flex;gap:10px;flex-wrap:wrap}
.field{flex:1;min-width:140px}
.field label{display:block;font-size:12px;font-weight:600;color:#6b6b67;margin-bottom:5px}
.field input{width:100%;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;background:#f5f4f0;color:#1a1a18;border:1px solid rgba(0,0,0,0.15);border-radius:8px;outline:none;transition:border-color .2s}
.field input:focus{border-color:rgba(0,0,0,0.4)}
.field input.err{border-color:#dc2626}
.ferr{font-size:11px;color:#dc2626;margin-top:4px;display:none}
.ferr.show{display:block}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid rgba(0,0,0,0.12);background:transparent;color:#6b6b67;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif}
.tab:hover{border-color:rgba(0,0,0,0.3);color:#1a1a18}
.tab.active{border-color:#1a1a18;background:#1a1a18;color:#fff}
.tab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0}
.tab.done-all .dot{background:#16a34a;opacity:1}
.tab.done-some .dot{background:#d97706;opacity:1}
.tab.done-none .dot{background:#dc2626;opacity:1}
.tab.active .dot{background:#fff;opacity:.5}
.tab.active.done-all .dot{background:#4ade80;opacity:1}
.tab.active.done-some .dot{background:#fbbf24;opacity:1}
.tab.active.done-none .dot{background:#f87171;opacity:1}
.prob-title{font-size:16px;font-weight:600;margin-bottom:5px;color:#1a1a18}
.prob-desc{font-size:14px;color:#5a5a56;line-height:1.7;margin-bottom:12px}
.prob-desc code{font-family:'JetBrains Mono',monospace;font-size:12px;background:#f5f4f0;padding:1px 5px;border-radius:4px;color:#1a1a18}
.ex-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#9a9a94;margin-bottom:6px}
.examples{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.example{flex:1;min-width:110px;background:#f5f4f0;border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9}
.ex-in{color:#6b6b67}.ex-hl{color:#1a1a18;font-weight:600}
.ex-out{color:#1a1a18;font-weight:600}
.tc-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#9a9a94;margin-bottom:7px}
.tc-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.tc-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#f0efeb;color:#9a9a94;border:1.5px solid rgba(0,0,0,0.1);transition:all .2s}
.tc-dot.pass{background:#dcfce7;color:#16a34a;border-color:transparent}
.tc-dot.fail{background:#fee2e2;color:#dc2626;border-color:transparent}
.tc-dot.err{background:#fef3c7;color:#d97706;border-color:transparent}
.tc-dot.prompt-fail{background:#fce7f3;color:#9d174d;border-color:transparent}
.tc-label{font-size:12px;color:#9a9a94;margin-bottom:12px;margin-top:5px}
textarea{width:100%;min-height:120px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;background:#f5f4f0;color:#1a1a18;border:1px solid rgba(0,0,0,0.15);border-radius:8px;padding:12px;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:rgba(0,0,0,0.4)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;background:#1a1a18;color:#fff;margin-top:10px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.error-msg{margin-top:8px;padding:9px 12px;background:#fee2e2;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#dc2626;white-space:pre-wrap;display:none;line-height:1.6}

.prompt-msg{margin-top:8px;padding:9px 12px;background:#fce7f3;border-radius:8px;font-size:12px;color:#9d174d;display:none;line-height:1.6}
.prompt-msg.show{display:block}
.summary{margin-top:12px;padding:14px 16px;border-radius:10px;border:1px solid rgba(0,0,0,0.08);background:#f5f4f0;display:none}
.summary.show{display:block}
.sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sum-score{font-size:22px;font-weight:700}
.sum-score.all{color:#16a34a}.sum-score.some{color:#d97706}.sum-score.none{color:#dc2626}
.sum-label{font-size:13px;color:#6b6b67;margin-top:2px}
.progress{height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s;background:#16a34a}
.progress-fill.some{background:#d97706}.progress-fill.none{background:#dc2626}
.overall{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:none}
.overall.show{display:block}
.ov-grid{display:flex;gap:8px;flex-wrap:wrap}
.ov-item{flex:1;min-width:70px;background:#f5f4f0;border-radius:8px;padding:8px 10px;text-align:center}

.ov-num.all{color:#16a34a}.ov-num.some{color:#d97706}
.ov-lbl{font-size:11px;color:#9a9a94;margin-top:2px}
.submit-status{margin-top:10px;padding:10px 14px;border-radius:8px;background:#dcfce7;color:#15803d;font-size:13px;font-weight:500;display:none;text-align:center}
.submit-status.show{display:block}
.dot{display:inline-block;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>

<div class="week-header">
  <div class="week-badge" id="wb"></div>

      <div class="ferr" id="ferr-name">กรุณากรอกชื่อ-นามสกุล</div>
    </div>
    <div class="field" style="max-width:165px">
      <label>รหัสประจำตัว</label>

      <div class="ferr" id="ferr-id">กรุณากรอกรหัสประจำตัว</div>
    </div>
  </div>
</div>

<div class="overall" id="overall">
  <div class="card-title">ภาพรวมทุกข้อ</div>
  <div class="ov-grid" id="ov-grid"></div>
</div>

<div class="tabs" id="tab-bar"></div>

<div class="card" id="prob-panel">
  <div class="prob-title" id="prob-title"></div>
  <div class="prob-desc" id="prob-desc"></div>
  <div class="ex-label">ตัวอย่าง</div>
  <div class="examples" id="prob-examples"></div>
  <div class="tc-section-label">Test Cases</div>
  <div class="tc-row" id="tc-row"></div>
  <div class="tc-label" id="tc-label">— ยังไม่ได้ส่ง</div>
  <textarea id="code" spellcheck="false" placeholder="# เขียนโค้ดของคุณที่นี่..."></textarea>
  <div id="error-msg" class="error-msg"></div>
  <div id="prompt-msg" class="prompt-msg"></div>
  <button class="btn" id="submit-btn" onclick="runTests()">ส่งคำตอบ</button>
  <div class="summary" id="summary">

      <div>
        <div class="sum-score" id="sum-score"></div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
let pyodide = null, pyReady = false;
let currentIdx = 0;
const state = PROBLEMS.map(p => ({
  results: p.testCases.map(() => ({ status: 'pending' })),
  code: '',
}));

document.getElementById('wb').textContent = `สัปดาห์ที่ ${WEEK}`;
document.getElementById('wt').textContent = WEEK_TOPIC;

function validate() {
  let ok = true;
  ['sname','sid'].forEach((id,i) => {
    const el = document.getElementById(id);
    const er = document.getElementById(i===0?'ferr-name':'ferr-id');
    if (!el.value.trim()) { el.classList.add('err'); er.classList.add('show'); ok=false; }
    else { el.classList.remove('err'); er.classList.remove('show'); }
  });
  return ok;
}

function tabClass(i) {
  const r = state[i].results;
  if (r.every(x=>x.status==='pending')) return '';
  if (r.every(x=>x.status==='pass')) return 'done-all';
  if (r.some(x=>x.status==='pass')) return 'done-some';
  return 'done-none';
}

function renderTabs() {
  document.getElementById('tab-bar').innerHTML = PROBLEMS.map((p,i) =>
    `<button class="tab ${i===currentIdx?'active':''} ${tabClass(i)}" onclick="switchTab(${i})">
      <span class="dot"></span>ข้อ ${p.id}
    </button>`
  ).join('');
}

function renderOverall() {
  const el = document.getElementById('overall');
  if (!state.some(s=>s.results.some(r=>r.status!=='pending'))) { el.classList.remove('show'); return; }
  el.classList.add('show');
  document.getElementById('ov-grid').innerHTML = PROBLEMS.map((p,i) => {
    const r = state[i].results;
    const passed = r.filter(x=>x.status==='pass').length;
    const pending = r.every(x=>x.status==='pending');
    return `<div class="ov-item">
      <div class="ov-num ${pending?'':passed===r.length?'all':'some'}">${pending?'—':passed+'/'+r.length}</div>
      <div class="ov-lbl">ข้อ ${p.id}</div>
    </div>`;
  }).join('');
}

function renderDots(idx) {
  const r = state[idx].results;
  const p = PROBLEMS[idx];
  document.getElementById('tc-row').innerHTML = r.map((res,i) => {
    let cls='', icon=i+1;
    if (res.status==='pass')         { cls='pass';        icon='✓'; }
    else if (res.status==='fail')    { cls='fail';        icon='✗'; }
    else if (res.status==='err')     { cls='err';         icon='!'; }
    else if (res.status==='prompt-fail') { cls='prompt-fail'; icon='P'; }
    const isPromptCheck = p.testCases[i]?.checkPrompts;
    return `<div class="tc-dot ${cls}" title="${isPromptCheck?'เช็ค prompt':''}">${icon}</div>`;
  }).join('');
  const passed = r.filter(x=>x.status==='pass').length;
  document.getElementById('tc-label').textContent =
    r.every(x=>x.status==='pending') ? '— ยังไม่ได้ส่ง' : `ผ่าน ${passed} จาก ${r.length} test cases`;
}

function switchTab(i) {
  state[currentIdx].code = document.getElementById('code').value;
  currentIdx = i;
  const p = PROBLEMS[i];
  document.getElementById('prob-title').textContent = `ข้อ ${p.id}: ${p.title}`;
  document.getElementById('prob-desc').innerHTML = p.desc;
  document.getElementById('prob-examples').innerHTML = p.examples.map(ex =>
    `<div class="example">
      <div class="ex-label">Input</div>
      <div class="ex-in">${ex.input.replace(/\n/g,'<br>').replace(/(:\s*)(\S[^<]*?)(?=<br>|$)/g,'$1<span class="ex-hl">$2</span>')}</div>
      <div class="ex-label" style="margin-top:7px">Output</div>
      <div class="ex-out">${ex.output}</div>
    </div>`).join('');
  document.getElementById('code').value = state[i].code;
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('prompt-msg').classList.remove('show');
  document.getElementById('submit-status').classList.remove('show');
  const r = state[i].results;
  const anyDone = r.some(x=>x.status!=='pending');
  const passed = r.filter(x=>x.status==='pass').length;
  const pct = Math.round(passed/r.length*100);
  const sumEl = document.getElementById('summary');
  if (anyDone) {
    sumEl.classList.add('show');
    const sc = document.getElementById('sum-score');
    sc.textContent = `${passed}/${r.length}`;
    sc.className = 'sum-score '+(passed===r.length?'all':passed>0?'some':'none');
    const fill = document.getElementById('progress-fill');
    fill.style.width = pct+'%';
    fill.className = 'progress-fill'+(passed===r.length?'':passed>0?' some':' none');
    document.getElementById('sum-emoji').textContent = passed===r.length?'🎉':passed>0?'💪':'🔍';
  } else { sumEl.classList.remove('show'); }
  renderDots(i);
  renderTabs();
  document.getElementById('submit-btn').disabled = !pyReady;
  document.getElementById('submit-btn').textContent = 'ส่งคำตอบ';
}

async function runCode(code, inputs) {
  const inputsJson = JSON.stringify(inputs);
  const wrapped = `
import sys
from io import StringIO
_out = StringIO()
_inputs = iter(${inputsJson})
def _inp(prompt=''):
    val = next(_inputs)
    _out.write(str(prompt) + str(val) + '\\n')
    return val
import builtins
builtins.input = _inp
sys.stdout = _out
${code}
sys.stdout = sys.__stdout__
__out__ = _out.getvalue()
`;
  await pyodide.runPythonAsync(wrapped);
  return pyodide.globals.get('__out__');
}

function parseOutput(raw, checkPrompts) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (checkPrompts) {
    // แยก prompt lines และ output lines
    const promptLines  = lines.filter(l => checkPrompts.some(p => l.startsWith(p.trim())));
    const outputLines  = lines.filter(l => !checkPrompts.some(p => l.startsWith(p.trim())));
    return { promptLines, outputLine: outputLines[outputLines.length-1] || '' };
  }
  // ไม่เช็ค prompt — กรองบรรทัดที่เป็น prompt ออกด้วย heuristic
  const outputLines = lines.filter(l => !l.includes(': ') || l.startsWith('Area') || l === 'Even' || l === 'Odd');
  // fallback: เอาบรรทัดสุดท้ายที่ไม่ใช่ input echo
  const lastLine = lines[lines.length-1] || '';
  return { promptLines: [], outputLine: lastLine };
}

async function saveToSheet(name, sid, probIdx, passed, total, code) {
  if (!SHEET_URL || SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  const p = PROBLEMS[probIdx];
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        week:   WEEK,
        name:   name,
        sid:    sid,
        probId: p.id,
        title:  p.title,
        passed: passed,
        total:  total,
        code:   code,
        time:   new Date().toLocaleString('th-TH'),
      }),
    });
  } catch(e) { console.warn('Sheet save failed:', e); }
}

async function runTests() {
  if (!pyReady) return;
  if (!validate()) return;
  const code = document.getElementById('code').value;
  if (!code.trim()) return;
  state[currentIdx].code = code;

  const errEl    = document.getElementById('error-msg');
  const promptEl = document.getElementById('prompt-msg');
  const statusEl = document.getElementById('submit-status');
  errEl.classList.remove('show');
  promptEl.classList.remove('show');
  statusEl.classList.remove('show');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = 'กำลังตรวจ <span class="dot">·</span><span class="dot">·</span><span class="dot">·</span>';

  const p = PROBLEMS[currentIdx];
  const r = state[currentIdx].results;
  let passed = 0, firstErr = null, promptErrors = [];

  for (let i = 0; i < p.testCases.length; i++) {
    const tc = p.testCases[i];
    try {
      const raw = await runCode(code, tc.input);

      if (tc.checkPrompts) {
        // เช็ค prompt
        const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
        const missing = tc.checkPrompts.filter(ep => !lines.some(l => l.startsWith(ep.trim())));
        if (missing.length > 0) {
          r[i] = { status: 'prompt-fail' };
          promptErrors.push(...missing);
          renderDots(currentIdx);
          continue;
        }
      }

      // กรอง prompt lines ออก เอาบรรทัดสุดท้ายที่ไม่ใช่ prompt
      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const outputLines = lines.filter(l => {
        if (!l) return false;
        // ถ้ามี checkPrompts ใช้กรองตรงๆ
        if (tc.checkPrompts) return !tc.checkPrompts.some(ep => l.startsWith(ep.trim()));
        // ไม่มี checkPrompts — ใช้ prompt ของ test case แรกที่มี checkPrompts ในข้อนี้
        const refPrompts = p.testCases.find(t => t.checkPrompts)?.checkPrompts || [];
        if (refPrompts.length) return !refPrompts.some(ep => l.startsWith(ep.trim()));
        return true;
      });
      const got = outputLines[outputLines.length-1] || '';

      r[i] = { status: got === tc.expected ? 'pass' : 'fail' };
      if (got === tc.expected) passed++;
    } catch(e) {
      r[i] = { status: 'err' };
      if (!firstErr) firstErr = e.message;
    }
    renderDots(currentIdx);
  }

  const total = p.testCases.length;
  const pct = Math.round(passed/total*100);
  const sumEl = document.getElementById('summary');
  sumEl.classList.add('show');
  const sc = document.getElementById('sum-score');
  sc.textContent = `${passed}/${total}`;
  sc.className = 'sum-score '+(passed===total?'all':passed>0?'some':'none');
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct+'%';
  fill.className = 'progress-fill'+(passed===total?'':passed>0?' some':' none');
  document.getElementById('sum-emoji').textContent = passed===total?'🎉':passed>0?'💪':'🔍';

  if (firstErr) { errEl.textContent = firstErr; errEl.classList.add('show'); }
  if (promptErrors.length) {
    promptEl.textContent = '⚠ Prompt ไม่ถูกต้อง — ต้องพิมพ์: ' + [...new Set(promptErrors)].join(', ');
    promptEl.classList.add('show');
  }

  const name = document.getElementById('sname').value.trim();
  const sid  = document.getElementById('sid').value.trim();
  await saveToSheet(name, sid, currentIdx, passed, total, code);

  if (SHEET_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
    statusEl.textContent = '✓ บันทึกผลแล้ว';
    statusEl.className = 'submit-status show';
  }

  renderTabs();
  renderOverall();
  btn.disabled = false;
  btn.textContent = 'ส่งคำตอบอีกครั้ง';
}

async function init() {
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'กำลังโหลด Python…';
  btn.disabled = true;
  renderTabs();
  switchTab(0);
  try {
    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/' });
    pyReady = true;
    btn.textContent = 'ส่งคำตอบ';
    btn.disabled = false;
  } catch(e) {
    btn.textContent = 'โหลดไม่สำเร็จ — ลองรีเฟรช';
  }
}
init();
</script>
